<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Easy Pass | نظام مراجعة اختبارات AOU</title>
  <meta
    name="description"
    content="Easy Pass هو نظام مراجعة نهائية لطلاب الجامعة العربية المفتوحة AOU. Preview جاهز لكل مادة، وطلب مباشر عبر واتساب، ومحتوى مركز يساعدك على الاستعداد للاختبار بشكل أوضح."
  />

  <style>
    :root {
      --bg: #f6f2e8;
      --bg-2: #efe8d8;
      --surface: rgba(255,255,255,0.78);
      --surface-strong: #ffffff;
      --surface-dark: #141a15;
      --text: #141914;
      --muted: #697066;
      --line: rgba(20, 25, 20, 0.10);

      --brand: #304132;
      --brand-2: #435746;
      --brand-3: #5f7262;
      --brand-soft: #eaf0e7;

      --accent: #c8a35b;
      --accent-2: #e0bf79;
      --accent-dark: #8e6b2c;

      --success-soft: rgba(48, 65, 50, 0.08);

      --shadow-xs: 0 8px 18px rgba(18, 24, 18, 0.05);
      --shadow-sm: 0 16px 34px rgba(18, 24, 18, 0.08);
      --shadow: 0 22px 60px rgba(18, 24, 18, 0.10);
      --shadow-strong: 0 30px 80px rgba(18, 24, 18, 0.14);
      --shadow-glow: 0 20px 50px rgba(200, 163, 91, 0.20);

      --radius-xl: 34px;
      --radius-lg: 26px;
      --radius-md: 20px;
      --radius-sm: 16px;
      --max: 1220px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Tahoma, Arial, sans-serif;
      color: var(--text);
      line-height: 1.75;
      background:
        radial-gradient(circle at top right, rgba(200,163,91,0.18), transparent 22%),
        radial-gradient(circle at 10% 10%, rgba(67,87,70,0.14), transparent 24%),
        radial-gradient(circle at 80% 40%, rgba(200,163,91,0.08), transparent 18%),
        linear-gradient(180deg, #faf8f2 0%, var(--bg) 52%, #f9f5eb 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 36px 36px;
      opacity: 0.18;
      z-index: -1;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .wrapper {
      width: min(var(--max), calc(100% - 32px));
      margin: 0 auto;
      position: relative;
    }

    .glass {
      background: var(--surface);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.55);
      box-shadow: var(--shadow);
    }

    .section {
      padding: 40px 0;
      position: relative;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
    }

    .section-head h2 {
      margin: 0;
      font-size: clamp(30px, 4vw, 44px);
      line-height: 1.12;
      letter-spacing: -0.02em;
    }

    .section-head p {
      margin: 12px 0 0;
      max-width: 700px;
      color: var(--muted);
      font-size: 16px;
    }

    .floating-note {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(20,25,20,0.06);
      box-shadow: var(--shadow-xs);
    }

    .eyebrow,
    .eyebrow-dark {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .eyebrow {
      background: rgba(48,65,50,0.10);
      color: var(--brand);
    }

    .eyebrow-dark {
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.88);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      padding-top: 14px;
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 14px 18px;
      border-radius: 999px;
      position: relative;
      box-shadow: 0 18px 40px rgba(18,24,18,0.08);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      background:
        linear-gradient(145deg, #fff, #f2ede2);
      border: 1px solid rgba(20,25,20,0.08);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.65),
        0 16px 30px rgba(18,24,18,0.10);
      overflow: hidden;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .brand-mark img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .brand-text strong {
      display: block;
      font-size: 15px;
      white-space: nowrap;
    }

    .brand-text span {
      display: block;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .nav a {
      font-size: 14px;
      color: var(--muted);
      transition: 0.2s ease;
      position: relative;
      padding-bottom: 2px;
    }

    .nav a::after {
      content: "";
      position: absolute;
      right: 0;
      bottom: -2px;
      width: 0;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 0.2s ease;
    }

    .nav a:hover {
      color: var(--text);
    }

    .nav a:hover::after {
      width: 100%;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .btn,
    .btn-secondary,
    .btn-amber,
    .btn-dark,
    .action-link,
    .action-link.primary,
    .mini-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 800;
      transition:
        transform 0.18s ease,
        box-shadow 0.18s ease,
        background 0.18s ease,
        color 0.18s ease,
        border-color 0.18s ease;
    }

    .btn:hover,
    .btn-secondary:hover,
    .btn-amber:hover,
    .btn-dark:hover,
    .action-link:hover,
    .action-link.primary:hover,
    .mini-link:hover {
      transform: translateY(-2px);
    }

    .btn {
      padding: 14px 24px;
      font-size: 14px;
      color: #fff;
      background: linear-gradient(145deg, var(--brand), var(--brand-3));
      border: 1px solid transparent;
      box-shadow: 0 18px 34px rgba(48,65,50,0.24);
    }

    .btn-dark {
      padding: 14px 24px;
      font-size: 14px;
      color: #fff;
      background:
        linear-gradient(145deg, #0f1410, #1f2820);
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 18px 34px rgba(15,20,16,0.24);
    }

    .btn-secondary {
      padding: 14px 24px;
      font-size: 14px;
      color: var(--text);
      background: rgba(255,255,255,0.76);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-xs);
    }

    .btn-amber {
      padding: 14px 24px;
      font-size: 14px;
      color: #fff;
      background: linear-gradient(145deg, var(--accent), var(--accent-2));
      border: 1px solid rgba(142,107,44,0.16);
      box-shadow: var(--shadow-glow);
    }

    .btn-amber:hover {
      box-shadow: 0 24px 54px rgba(200,163,91,0.28);
    }

    .mini-link {
      padding: 11px 16px;
      font-size: 13px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.82);
      color: var(--text);
      box-shadow: var(--shadow-xs);
    }

    .announcement {
      margin-top: 18px;
      padding: 14px 18px;
      border-radius: 999px;
      text-align: center;
      font-size: 14px;
      color: #6c5124;
      border: 1px solid rgba(200,163,91,0.18);
      background:
        linear-gradient(135deg, rgba(255,255,255,0.78), rgba(200,163,91,0.11));
      box-shadow: 0 14px 28px rgba(178,139,75,0.10);
    }

    .hero {
      padding: 42px 0 28px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 24px;
      align-items: stretch;
    }

    .hero-main,
    .hero-side {
      border-radius: var(--radius-xl);
      position: relative;
      overflow: hidden;
    }
